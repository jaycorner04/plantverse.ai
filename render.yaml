services:
  - type: web
    name: plantverse-ai-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_BODY_BYTES
        value: "12000000"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-4-maverick:free
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PLANTNET_API_KEY
        sync: false
      - key: PLANT_ID_API_KEY
        sync: false
      - key: PERENUAL_API_KEY
        sync: false
