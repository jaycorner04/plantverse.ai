<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PlantVerse AI plant intelligence dashboard.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PlantVerse AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PlantVerse AI</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      background: #cfcfcf;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #plantverse-loader {
      background: #cfcfcf;
      inset: 0;
      overflow: hidden;
      position: fixed;
      transition:
        opacity 760ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 760ms cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 9999;
    }

    #plantverse-loader.loader-exit {
      filter: blur(16px);
      opacity: 0;
      pointer-events: none;
    }

    #abhi-intro-video {
      background: #cfcfcf;
      height: 100%;
      inset: 0;
      object-fit: cover;
      position: absolute;
      width: 100%;
    }
  </style>

  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="plantverse-loader" aria-label="Abhi intro">
    <video
      id="abhi-intro-video"
      autoplay
      muted
      playsinline
      preload="auto"
      src="intro/abhi-intro-abhi-v2.mp4"
    ></video>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      const loader = document.getElementById('plantverse-loader');
      const video = document.getElementById('abhi-intro-video');
      const introMs = 5470;
      const start = performance.now();

      const introDone = new Promise(function(resolve) {
        let resolved = false;
        function finish() {
          if (resolved) return;
          resolved = true;
          resolve();
        }
        video?.addEventListener('ended', finish, { once: true });
        setTimeout(finish, introMs + 900);
      });

      video?.play?.().catch(function() {});

      const appReady = new Promise(function(resolve) {
        _flutter.loader.loadEntrypoint({
          onEntrypointLoaded: function(engineInitializer) {
            engineInitializer.initializeEngine().then(resolve);
          }
        });
      });

      Promise.all([
        appReady,
        introDone,
        new Promise(function(resolve) {
          setTimeout(resolve, Math.max(0, introMs - (performance.now() - start)));
        })
      ]).then(function(results) {
        const appRunner = results[0];
        appRunner.runApp();
        requestAnimationFrame(function() {
          loader?.classList.add('loader-exit');
          setTimeout(function() { loader?.remove(); }, 820);
        });
      });
    });
  </script>
</body>
</html>
