name: plantverse_ai
description: A modern AI-powered mobile application for plant identification and care.
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.1
  
  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0+1
  lottie: ^2.7.0
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  glassmorphism_ui: ^0.3.0
  
  # Camera & File Upload
  image_picker: ^1.2.2
  
  # Environment & Utils
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  http: ^1.1.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/data/
