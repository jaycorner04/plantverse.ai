name: Deploy Flutter Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.6"
          channel: stable
          cache: true

      - name: Create public web environment file
        shell: bash
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=
          SUPABASE_ANON_KEY=
          GEMINI_API_KEY=
          GEMINI_MODEL=gemini-2.0-flash-lite
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release --web-renderer html --base-href /plantverse.ai/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
